version: "3.8"

services:
  dashboard:
    build: .
    ports:
      - "3000:3000"
    environment:
      # EmailBison API (Analytics)
      - EMAILBISON_API_URL=${EMAILBISON_API_URL}
      - EMAILBISON_API_TOKEN=${EMAILBISON_API_TOKEN}
      # Workspace
      - WORKSPACE_ID=${WORKSPACE_ID}
      - WORKSPACE_NAME=${WORKSPACE_NAME:-Dashboard}
      # Infrastructure API (Charm OS)
      - INFRASTRUCTURE_API_URL=${INFRASTRUCTURE_API_URL}
      - INFRASTRUCTURE_CLIENT_ID=${INFRASTRUCTURE_CLIENT_ID}
      # Security
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
      # Optional
      - NEXT_PUBLIC_DASHBOARD_TITLE=${NEXT_PUBLIC_DASHBOARD_TITLE:-Client Dashboard}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AI_ARK_API_KEY=${AI_ARK_API_KEY:-}
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

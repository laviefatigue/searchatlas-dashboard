version: "3.8"

services:
  selery-dashboard:
    build: .
    ports:
      - "3000:3000"
    environment:
      # EmailBison API (Analytics)
      - EMAILBISON_API_URL=https://spellcast.hirecharm.com
      - EMAILBISON_API_TOKEN=${EMAILBISON_API_TOKEN}
      # Infrastructure API (Charm OS) - defaults to production
      - INFRASTRUCTURE_API_URL=${INFRASTRUCTURE_API_URL:-http://ccssgc4gowsog04wck400o0w.31.97.142.123.sslip.io}
      - INFRASTRUCTURE_CLIENT_ID=e5988a33-ec6c-4b5a-be85-25b8bd0678bb
      # Optional
      - NEXT_PUBLIC_DASHBOARD_TITLE=Selery Dashboard
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
